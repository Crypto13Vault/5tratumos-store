services:
  dashboard:
    build: .
    restart: unless-stopped
    stop_grace_period: 10s
    ports:
      - "5050:5050/tcp"
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
    networks:
      default:
        aliases:
          - bitaxe-dashboard
    environment:
      SCAN_SUBNET: "192.168.0.0/24"
      DASHBOARD_HOST: "100.104.162.99"
      THROTTLE_HIGH: "67"
      THROTTLE_PERF_TEMP: "55"
      THROTTLE_LOW: "60"
      THROTTLE_OVERHEAT_COOLDOWN: "600"
      PLANNER_SAFETY_MARGIN: "3"
